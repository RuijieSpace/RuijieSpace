<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 540" width="900" height="540" role="img" aria-label="Character stats - GitHub RPG character sheet">
  <title>Character Stats</title>
  <desc>RPG-style character sheet with real GitHub data</desc>

  <rect width="900" height="540" fill="#FFFFFF"/>

  <rect x="2" y="2" width="896" height="536" fill="none" stroke="#1A1A1A" stroke-width="4"/>
  <rect x="10" y="10" width="880" height="520" fill="none" stroke="#1A1A1A" stroke-width="1" stroke-dasharray="3,3"/>

  <g transform="translate(24, 20)">
