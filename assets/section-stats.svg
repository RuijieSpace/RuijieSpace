      <rect x="50" y="72" width="30" height="4" fill="#1A1A1A"/>
      <rect x="10" y="76" width="5" height="5" fill="#1A1A1A"/>
      <rect x="115" y="76" width="5" height="5" fill="#1A1A1A"/>
