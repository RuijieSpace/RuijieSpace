<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 280" width="900" height="280" role="img" aria-label="Currently learning - skill progress bars">
  <title>Currently Learning</title>
  <desc>Animated pixel progress bars showing learning targets</desc>

  <rect width="900" height="280" fill="#FFFFFF"/>

  <g transform="translate(20, 20)">
