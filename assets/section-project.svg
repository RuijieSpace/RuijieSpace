<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 270" width="900" height="270" role="img" aria-label="Featured project - Deepstream Python Stack">
  <title>Featured Project</title>
  <desc>Pixel art project card for Deepstream Python Stack</desc>

  <rect width="900" height="270" fill="#FFFFFF"/>

