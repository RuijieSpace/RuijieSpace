<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 260" width="900" height="260" role="img" aria-label="About Ruijie - terminal window">
  <title>About</title>
  <desc>Terminal-style about section with typing animation</desc>

  <rect width="900" height="260" fill="#FFFFFF"/>

  <g>
    <rect x="4" y="4" width="892" height="252" fill="none" stroke="#1A1A1A" stroke-width="3"/>
    <rect x="4" y="4" width="892" height="28" fill="#1A1A1A"/>

    <circle cx="22" cy="18" r="5" fill="#FF6B35"/>
    <circle cx="40" cy="18" r="5" fill="#FFB800"/>
    <circle cx="58" cy="18" r="5" fill="#7FB069"/>

    <text x="450" y="22" font-family="'Courier New', monospace" font-size="11" fill="#AAAAAA" text-anchor="middle" letter-spacing="2">about.sh — ruijie@shenzhen</text>
    <text x="880" y="22" font-family="'Courier New', monospace" font-size="11" fill="#AAAAAA" text-anchor="end">[ 01 ]</text>
  </g>

  <g font-family="'Courier New', monospace" font-size="15">
    <text x="30" y="68" fill="#888">$</text>
    <text x="50" y="68" fill="#1A1A1A">whoami</text>

    <text x="30" y="92" fill="#FF6B35">→</text>
    <text x="50" y="92" fill="#1A1A1A">Ruijie · AI Algorithm Engineer</text>
    <text x="50" y="112" fill="#555">  building computer-vision pipelines</text>
    <text x="50" y="132" fill="#555">  turning video streams into structured signals</text>

    <text x="30" y="166" fill="#888">$</text>
    <text x="50" y="166" fill="#1A1A1A">cat ~/mission.txt</text>

    <text x="30" y="190" fill="#FF6B35">→</text>
    <text x="50" y="190" fill="#1A1A1A" font-style="italic">  "Constructing elegant hierarchies</text>
    <text x="50" y="210" fill="#1A1A1A" font-style="italic">   for maximum code reuse and extensibility."</text>

    <g transform="translate(30, 236)">
      <text x="0" y="0" fill="#888">$</text>
      <rect x="15" y="-12" width="10" height="14" fill="#1A1A1A">
        <animate attributeName="opacity" values="1;1;0;0;1" dur="1s" repeatCount="indefinite"/>
      </rect>
    </g>
  </g>

  <g transform="translate(780, 60)">
    <rect x="0" y="0" width="20" height="20" fill="#FF6B35"/>
    <rect x="25" y="0" width="20" height="20" fill="#FFFFFF" stroke="#1A1A1A" stroke-width="2"/>
    <rect x="50" y="0" width="20" height="20" fill="#1A1A1A"/>
    <rect x="0" y="25" width="20" height="20" fill="#FFFFFF" stroke="#1A1A1A" stroke-width="2"/>
    <rect x="25" y="25" width="20" height="20" fill="#7FB069">
      <animate attributeName="opacity" values="1;0.3;1" dur="2.5s" repeatCount="indefinite"/>
    </rect>
    <rect x="50" y="25" width="20" height="20" fill="#FFFFFF" stroke="#1A1A1A" stroke-width="2"/>
    <rect x="0" y="50" width="20" height="20" fill="#1A1A1A"/>
    <rect x="25" y="50" width="20" height="20" fill="#FFFFFF" stroke="#1A1A1A" stroke-width="2"/>
    <rect x="50" y="50" width="20" height="20" fill="#3776AB">
      <animate attributeName="opacity" values="1;0.3;1" dur="3s" repeatCount="indefinite"/>
    </rect>
  </g>

</svg>
